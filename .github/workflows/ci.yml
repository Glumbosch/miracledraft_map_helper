name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format, test, and lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Cache Cargo files
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-ci-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run public-fixture tests
        # These integration checks use user-provided fixture maps that are not
        # committed to the public repository. Keep them available for local
        # validation, but do not run them in GitHub Actions.
        run: >-
          cargo test --locked --all-targets --
          --skip inkarnate::tests::supplied_backup_matches_reference_island_mask_structure
          --skip svg::tests::export_svg_matches_basic_map_fixture_except_for_xlink_hrefs
          --skip svg_render::tests::fresh_water_csv_export_writes_visible_pixels_to_the_mask
          --skip svg_render::tests::layermap_json_settings_render_a_valid_mask_image

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  platform-build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo files
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-build-${{ runner.os }}-

      - name: Build release binary
        run: cargo build --release --locked
